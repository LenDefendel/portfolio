<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      ;(function () {
        var theme

        try {
          theme = localStorage.getItem('portfolio-theme')
        } catch (_error) {
          // Fall back to the system preference when storage is unavailable.
        }

        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        }

        document.documentElement.classList.add(theme)
        document.documentElement.style.colorScheme = theme
      })()
    </script>
    <style>
      html.dark {
        background-color: #0b0b0d;
      }

      html.light {
        background-color: #fafafa;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Портфолио Марии Филипповой — графический дизайнер." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lendefendel.github.io/portfolio/" />
    <meta property="og:title" content="Maria Filippova — Designer" />

      content="Портфолио Марии Филипповой: графический дизайн, иллюстрации, 3D-модели и визуализации."

    <link rel="preconnect" href="https://fonts.googleapis.com" />
